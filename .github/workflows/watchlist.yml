name: Watchlist Auto-Score

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run'
        required: true
        default: 'premarket'
        type: choice
        options:
          - earlypremarket
          - premarket
          - marketopen
          - midday
          - afterhours
          - eod
          - analyze
          - backfill

jobs:
  score-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas --quiet

      - name: Run scorer or results
        env:
          FINVIZ_TOKEN: ${{ secrets.FINVIZ_TOKEN }}
        run: |
          SESSION="${{ github.event.inputs.session }}"
          if [ "$SESSION" = "eod" ]; then
            python results.py
          elif [ "$SESSION" = "analyze" ]; then
            python analyze_timing.py
          elif [ "$SESSION" = "backfill" ]; then
            python backfill.py
          else
            python scorer.py --session $SESSION
          fi

      - name: Commit and push
        run: |
          git config user.name  "Watchlist Bot"
          git config user.email "bot@watchlist"
          git add docs/
          git diff --staged --quiet || git commit -m "Watchlist: ${{ github.event.inputs.session }} $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
