name: Watchlist Auto-Score

on:
  schedule:
    - cron: '0 10 * * 1-5'
    - cron: '30 14 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run'
        required: true
        default: 'premarket'
        type: choice
        options:
          - earlypremarket
          - premarket
          - marketopen
          - midday
          - afterhours
          - eod
          - analyze
          - backfill
          - backtest
          - swing-premarket
          - swing-midday

env:
  SWING_PRICE_MIN: "0.20"
  SWING_PRICE_MAX: "5.00"
  SWING_FLOAT_MAX_M: "10"
  SWING_MKTCAP_MAX_M: "50"
  SWING_AVG_VOL_MIN: "100000"
  SWING_MIN_SCORE: "0.35"
  SWING_SPIKE_DAYS: "90"
  SWING_SPIKE_PCT: "40"
  SWING_SHORT_INT_MIN: "10"
  SWING_DTC_MAX: "3"
  SWING_OUT_DIR: "docs"
  SWING_DATA_DIR: "docs/data/swing"

jobs:
  score-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          SESSION="${{ github.event.inputs.session }}"
          if [ "$SESSION" = "backtest" ]; then
            pip install yfinance databento pandas --quiet
          elif [ "$SESSION" = "swing-premarket" ] || [ "$SESSION" = "swing-midday" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            pip install yfinance pandas requests beautifulsoup4 --quiet
          else
            pip install yfinance pandas --quiet
          fi

      - name: Determine swing session (cron only)
        id: swing_session
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt "13" ]; then
            echo "name=premarket" >> $GITHUB_OUTPUT
          else
            echo "name=midday" >> $GITHUB_OUTPUT
          fi

      - name: Run scorer or results
        env:
          FINVIZ_TOKEN: ${{ secrets.FINVIZ_TOKEN }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: |
          SESSION="${{ github.event.inputs.session }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running swing scanner via cron..."
            python scripts/scanner.py --session ${{ steps.swing_session.outputs.name }}
            python scripts/build_watchlist.py
          elif [ "$SESSION" = "swing-premarket" ]; then
            echo "Running swing scanner: premarket..."
            python scripts/scanner.py --session premarket
            python scripts/build_watchlist.py
          elif [ "$SESSION" = "swing-midday" ]; then
            echo "Running swing scanner: midday..."
            python scripts/scanner.py --session midday
            python scripts/build_watchlist.py
          elif [ "$SESSION" = "eod" ]; then
            python results.py
          elif [ "$SESSION" = "analyze" ]; then
            python analyze_timing.py
          elif [ "$SESSION" = "backfill" ]; then
            python backfill.py
          elif [ "$SESSION" = "backtest" ]; then
            python build_backtest.py
          else
            python scorer.py --session $SESSION
          fi

      - name: Commit and push
        run: |
          git config user.name  "Watchlist Bot"
          git config user.email "bot@watchlist"
          git add -A docs/ backtest_runners.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Watchlist: ${{ github.event.inputs.session || 'swing-cron' }} $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
